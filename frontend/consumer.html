<!DOCTYPE html>
<html>
<head>
    <title>Consumer Login</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            padding-top: 60px;
        }

        .container {
            background: white;
            width: 350px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: orange;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
<div class="container">

<h2>Consumer Login</h2>

<input type="text" id="consumerUser" placeholder="Username"><br>
<input type="password" id="consumerPass" placeholder="Password"><br>

<button onclick="consumerLogin()">Login</button>

<hr>

<h2>Buy Electronic Product</h2>

<input type="number" id="buyProductId" placeholder="Product ID"><br>
<input type="number" id="amount" placeholder="Amount in Wei"><br>

<button onclick="buyProduct()">Buy Product</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>

<script>
const contractAddress = "0x5d4557a0De7D0017CDBDFea14D84332A80D4cF7E";

const abi = [
 {
   "inputs": [
     {"internalType":"uint256","name":"_id","type":"uint256"}
   ],
   "name":"buyProduct",
   "outputs":[],
   "stateMutability":"payable",
   "type":"function"
 }
];
let web3;
let contract;

window.onload = async () => {
    if(window.ethereum){
        web3 = new Web3(window.ethereum);
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        contract = new web3.eth.Contract(abi, contractAddress);
    }
}

function consumerLogin(){

    const user = document.getElementById("consumerUser").value;
    const pass = document.getElementById("consumerPass").value;

    if(user === "consumer" && pass === "1234"){
        alert("Consumer Login Successful");
    } else {
        alert("Invalid Login");
    }
}

async function buyProduct(){
     const accounts = await web3.eth.getAccounts();

    const productId = document.getElementById("buyProductId").value;
    const amount = document.getElementById("amount").value;

    await contract.methods.buyProduct(productId)
    .send({
        from: accounts[0],
        value: amount
    });

    alert("Electronic Product Purchased Successfully");
}
</script>

</body>
</html>
